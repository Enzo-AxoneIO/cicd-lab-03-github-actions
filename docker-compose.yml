# Mustry Academy — Lab 02
# A generic Flask + Redis dev stack used as the subject of branching/PR exercises.
#
# Run it:
#   cp .env.example .env
#   docker compose up -d
#
# Then probe it:
#   curl http://localhost:5051/health
#   curl "http://localhost:5051/greet?name=Ada"

services:
  app:
    build: ./sample-app
    container_name: lab03-app
    ports:
      - "5051:5051"
    environment:
      REDIS_URL: "redis://redis:6378/0"
      FLASK_DEBUG: "${FLASK_DEBUG:-0}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lab03-redis
    ports:
      - "6378:6378"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
